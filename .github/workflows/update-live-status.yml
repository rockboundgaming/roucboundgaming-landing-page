name: Update Live Status

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Twitch OAuth Token
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          if [ -z "${TWITCH_CLIENT_ID}" ] || [ -z "${TWITCH_CLIENT_SECRET}" ]; then
            echo "Twitch credentials not configured - skipping update."
            echo '{"data":[]}' > /tmp/streams.json
            echo "SKIP_TWITCH=true" >> "$GITHUB_ENV"
            exit 0
          fi

          TOKEN_RESPONSE=$(curl -s -X POST 'https://id.twitch.tv/oauth2/token' \
            -d "client_id=${TWITCH_CLIENT_ID}" \
            -d "client_secret=${TWITCH_CLIENT_SECRET}" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('access_token', ''))")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to obtain access token: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"

          SHEET_ID="2PACX-1vQR_A_KNK2zWNAYiT-a3baVWUSt8-_SE83gnyt4rOLDRruj0E-SVg4ej8-JnxaMuD0AxIYt6roaKJsg"
          SHEET_URL="https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=tsv"
          HTTP_STATUS=$(curl -sL -w "HTTP %{http_code}\n" "${SHEET_URL}" -o /tmp/creators.tsv)
          echo "=== creators.tsv first 10 lines ===" && head -10 /tmp/creators.tsv
          wc -l /tmp/creators.tsv
          echo "=== HTTP status ==="
          echo "${HTTP_STATUS}"
          if [ ! -s /tmp/creators.tsv ] || [ "$(wc -l < /tmp/creators.tsv)" -lt 2 ]; then
            echo "Spreadsheet download failed or empty — aborting so live-status.json is not overwritten with a narrow channel list"
            exit 1
          fi

      - name: Build channel list
        if: env.SKIP_TWITCH != 'true'
        shell: bash
        run: |
          python3 <<'PY'
          channels = ['rockboundgaming']
          with open('/tmp/creators.tsv') as f:
              lines = f.read().splitlines()

          for line in lines[1:]:
              if not line.strip():
                  continue
              cols = [c.strip().strip('\r') for c in line.split('\t')]
              if len(cols) < 3:
                  continue
              twitch = cols[0].lower()
              try:
                  level = int(cols[2])
              except ValueError:
                  continue
              featured = cols[4].lower() if len(cols) > 4 else ''
              eligible = cols[7].lower() if len(cols) > 7 else ''
              if twitch and level >= 5 and (featured == 'yes' or eligible == 'yes') and twitch not in channels:
                  channels.append(twitch)

          with open('/tmp/channels.txt', 'w') as f:
              f.write('\n'.join(channels[:100]))
          PY
          echo "=== Channels queried ===" && cat /tmp/channels.txt
          python3 - <<'PY'
          channels = [c for c in open('/tmp/channels.txt').read().splitlines() if c]
          print(f'Querying {len(channels)} channel(s): {channels}')
          PY

      - name: Query Twitch API
        if: env.SKIP_TWITCH != 'true'
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
        run: |
          QUERY=$(python3 -c "
          channels = open('/tmp/channels.txt').read().strip().split('\n')
          print('&'.join(f'user_login={c}' for c in channels if c))
          ")

          curl -s \
            -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://api.twitch.tv/helix/streams?${QUERY}" \
            > /tmp/streams.json

          echo "Twitch API response:"
          cat /tmp/streams.json
          python3 -c "import json; d=json.load(open('/tmp/streams.json')); print(f'Helix returned {len(d.get(\"data\", []))} live streams:', [s[\"user_login\"] for s in d.get(\"data\", [])])"

      - name: Generate live-status.json
        shell: bash
        run: |
          python3 <<'PY'
          import json, datetime, sys

          with open('/tmp/streams.json') as f:
              data = json.load(f)

          if 'data' not in data:
              print(f"Unexpected API response: {data}", file=sys.stderr)
              sys.exit(1)

          live = []
          for s in data['data']:
              live.append({
                  'twitch': s['user_login'].lower(),
                  'title': s.get('title', ''),
                  'viewerCount': s.get('viewer_count', 0)
              })

          try:
              with open('/tmp/channels.txt') as f:
                  channels_queried = [line.strip().lower() for line in f.read().splitlines() if line.strip()]
          except FileNotFoundError:
              channels_queried = []

          output = {
              'lastChecked': datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'live': live,
              'channelsQueried': channels_queried
          }

          with open('live-status.json', 'w') as f:
              json.dump(output, f, indent=2)
              f.write('\n')

          print(f"Live streamers: {[s['twitch'] for s in live]}")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live-status.json
          if git diff --staged --quiet; then
            echo "No changes to live-status.json"
          else
            git commit -m "chore: update live stream status [skip ci]"
            git push
          fi
